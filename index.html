<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punjab Foods · Rawalpindi</title>
  <meta name="description" content="Punjab Foods, Rawalpindi — traditional Pulao, Kabab, Roast and Deg catering for weddings and events.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3rem;
      font-weight: 700;
      color: #c9a227;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: #a3a3a3;
      margin-bottom: 2rem;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #c9a227;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 2rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      color: #c9a227;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .links a:hover {
      opacity: 0.8;
    }
    .contact {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #737373;
    }
  </style>
</head>
<body>
  <div class="logo">Punjab Foods</div>
  <div class="tagline">Pulao · Kabab · Roast · Deg</div>
  <div class="loader"></div>
  <div class="links">
    <a href="/menu">Menu</a>
    <a href="/catering">Catering</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
  <div class="contact">Rawalpindi, Pakistan</div>
</body>
</html>
